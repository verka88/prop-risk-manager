<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prop Risk Manager 10k (FX)</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111111" />

  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 0; background:#0b0b0c; color:#f2f2f2; }
    .wrap { max-width: 860px; margin: 0 auto; padding: 16px; }
    h1 { font-size: 20px; margin: 10px 0 16px; }
    h2 { font-size: 14px; opacity:.9; margin: 0 0 10px; }
    .card { background:#151519; border:1px solid #24242a; border-radius: 14px; padding: 14px; margin-bottom: 12px; }
    label { display:block; font-size: 12px; opacity:.85; margin: 10px 0 6px; }
    input, select { width: 100%; padding: 10px; border-radius: 10px; border:1px solid #2c2c35; background:#0f0f13; color:#f2f2f2; }
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid3 { display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .row { display:flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #24242a; }
    .row:last-child { border-bottom: 0; }
    button { width:100%; padding: 12px; border-radius: 12px; border:1px solid #2c2c35; background:#1c1c24; color:#fff; font-weight:600; cursor:pointer; }
  </style>
</head>
<body>

<div class="wrap">
  <h1>Prop Risk Manager 10 000€ (FX)</h1>

  <div class="card">
    <h2>Prop Limity</h2>

    <div class="grid3">
      <div>
        <label>Start Balance</label>
        <input id="startBalance" type="number" value="10000">
      </div>
      <div>
        <label>Daily %</label>
        <input id="dailyPct" type="number" value="5">
      </div>
      <div>
        <label>Max %</label>
        <input id="maxPct" type="number" value="10">
      </div>
    </div>

    <div class="grid">
      <div>
        <label>Current Balance</label>
        <input id="currentBalance" type="number" value="10000">
      </div>
      <div>
        <label>Today PnL</label>
        <input id="todayPnl" type="number" value="0">
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Trade Výpočet</h2>

    <div class="grid3">
      <div>
        <label>Pár</label>
        <select id="pair">
          <option>EURUSD</option>
          <option>GBPUSD</option>
          <option>USDJPY</option>
          <option>EURJPY</option>
          <option>EURGBP</option>
        </select>
      </div>

      <div>
        <label>Smer</label>
        <select id="dir">
          <option>LONG</option>
          <option>SHORT</option>
        </select>
      </div>

      <div>
        <label>Risk %</label>
        <select id="riskPct">
          <option value="0.25">0.25%</option>
          <option value="0.5" selected>0.5%</option>
          <option value="1">1%</option>
        </select>
      </div>
    </div>

    <div class="grid">
      <div>
        <label>Entry</label>
        <input id="entry" type="number" value="1.1000">
      </div>
      <div>
        <label>Stop (pips)</label>
        <input id="stopPips" type="number" value="20">
      </div>
    </div>

    <button id="calcBtn">Vypočítať</button>
  </div>

  <div class="card">
    <h2>Výsledky</h2>

    <div class="row">
      <div>Risk €</div>
      <div id="riskEur">-</div>
    </div>

    <div class="row">
      <div>Lot Size</div>
      <div id="lots">-</div>
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
