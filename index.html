<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prop Risk Tool</title>

<style>
body { background:#0b0b0c; color:white; font-family:Arial; margin:0; }
.wrap { max-width:900px; margin:auto; padding:20px; }
.card { background:#151519; padding:15px; border-radius:12px; margin-bottom:15px; border:1px solid #24242a; }
label { font-size:12px; display:block; margin-top:10px; opacity:.8; }
input, select { width:100%; padding:8px; background:#0f0f13; color:white; border:1px solid #2c2c35; border-radius:8px; }
button { padding:10px; width:100%; background:#1c1c24; color:white; border:1px solid #2c2c35; border-radius:10px; cursor:pointer; font-weight:bold; margin-top:10px; }
.row { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #24242a; }
.row:last-child { border-bottom:0; }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
h3 { margin-top:0; }
</style>
</head>

<body>
<div class="wrap">

<h2>Prop Risk Tool</h2>

<div class="card">
<h3>Calculator</h3>

<div class="grid3">
<div>
<label>Balance (EUR)</label>
<input id="balance" value="10000">
</div>
<div>
<label>Risk %</label>
<input id="riskPct" value="0,5">
</div>
<div>
<label>Entry price</label>
<input id="entry" value="1,1000">
</div>
</div>

<div class="grid3">
<div>
<label>SL (pips/ticks)</label>
<input id="slUnits" value="20">
</div>
<div>
<label>TP (pips/ticks)</label>
<input id="tpUnits" value="40">
</div>
<div>
<label>Value per unit (EUR)</label>
<input id="valuePerUnit" value="9">
</div>
</div>

<button onclick="calculate()">Calculate</button>
</div>

<div class="card">
<h3>Results</h3>
<div class="row"><div>Risk €</div><div id="riskOut">-</div></div>
<div class="row"><div>Lots</div><div id="lotsOut">-</div></div>
<div class="row"><div>SL distance</div><div id="slUnitsOut">-</div></div>
<div class="row"><div>TP distance</div><div id="tpUnitsOut">-</div></div>
<div class="row"><div>SL price</div><div id="slPriceOut">-</div></div>
<div class="row"><div>TP price</div><div id="tpPriceOut">-</div></div>
</div>

<div class="card">
<h3>Prop Engine (Pro)</h3>

<div class="grid3">
<div>
<label>Account size</label>
<input id="accountSize" value="10000">
</div>
<div>
<label>Daily loss %</label>
<input id="dailyLossPct" value="5">
</div>
<div>
<label>Max loss %</label>
<input id="maxLossPct" value="10">
</div>
</div>

<div class="grid2">
<div>
<label>Today PnL</label>
<input id="todayPnl" value="0">
</div>
<div>
<label>Total PnL</label>
<input id="totalPnL" value="0">
</div>
</div>

<div class="row"><div>Remaining Daily</div><div id="remainingDailyOut">-</div></div>
<div class="row"><div>Remaining Overall</div><div id="remainingOverallOut">-</div></div>
<div class="row"><div>Status</div><div id="tradeStatusOut">-</div></div>
</div>

<div class="card">
<h3>Can I Take This Trade?</h3>
<div class="row"><div>Daily usage %</div><div id="dailyUsageOut">-</div></div>
<div class="row"><div>Remaining after trade</div><div id="afterTradeDailyOut">-</div></div>
<div class="row"><div>Max R left</div><div id="maxRLeftOut">-</div></div>
<div class="row"><div>Decision</div><div id="canTakeDecisionOut">-</div></div>
</div>

</div>

<script src="app.js?v=20"></script>
</body>
</html>
